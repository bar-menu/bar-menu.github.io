            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;

        /* Pagina A4 */
        .page {
            width: 210mm;
            min-height: 297mm; /* Min height per sicurezza */
            background-color: var(--bg-color);
            margin: 10mm auto;
            position: relative;
            padding: 20mm 15mm; /* Margini interni sicuri */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden; 
        }

        /* Stili per la STAMPA */
        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: none; margin: 0; }
            .page { margin: 0; box-shadow: none; width: 100%; height: 100%; page-break-after: always; }
        }

        /* SVG CORNICE SULLO SFONDO */
        .full-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* LAYOUT A COLONNE */
        .content {
            column-count: 2;
            column-gap: 10mm;
            column-rule: 1px solid #e0e0e0; /* Riga grigia tra le colonne */
            position: relative;
            z-index: 10;
            height: 100%;
        }

        .section {
            break-inside: avoid; /* Non spezzare le categorie a metà */
            margin-bottom: 8mm;
        }

        /* TITOLI CON GRADIENTE ORO */
        h2.category-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2mm;
            padding-bottom: 2px;
            border-bottom: 2px solid #ddd;
            
            /* Applicazione Gradiente al Testo */
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        /* INTESTAZIONE B | T (Piccola) */
        .price-header {
            display: flex;
            justify-content: flex-end;
            font-size: 0.6rem;
            font-weight: 700;
            color: #b38728; /* Oro scuro piatto per leggibilità */
            margin-bottom: 2px;
            padding-right: 0;
            opacity: 0.8;
        }
        .price-header span { width: 75px; text-align: center; }

        /* RIGA PRODOTTO */
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.5mm;
            font-size: 0.85rem; /* Testo compatto per farci stare tutto */
        }

        .item-name {
            font-weight: 600;
            color: #333;
            padding-right: 4px;
        }

        .dots {
            flex-grow: 1;
            border-bottom: 1px dotted #ccc;
            margin: 0 4px;
            position: relative;
            top: -4px;
        }

        /* PREZZI */
        .item-prices {
            display: flex;
            justify-content: space-between;
            width: 75px; /* Larghezza fissa per allineare le colonne */
            flex-shrink: 0;
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
        }
        .price-banco { 
            color: #777; 
            font-weight: 400; 
            width: 50%; 
            text-align: center; 
            font-size: 0.8rem; /* Un po' più piccolo */
        }
        .price-tavolo { 
            font-weight: 700; 
            color: #000; 
            width: 50%; 
            text-align: center; 
        }

        /* BOX SPECIALE PER COCKTAIL/BIRRE GRUPPI */
        .special-box {
            background: rgba(196, 166, 97, 0.1); /* Oro chiarissimo */
            border: 1px solid #d4af37;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        .special-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px dashed #d4af37;
            padding-bottom: 4px; margin-bottom: 6px;
        }
        .special-title { font-weight: 700; color: #b38728; font-size: 0.9rem; }
        .special-prices { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1rem; }
        
        .special-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 10px;
        }
        .special-item {
            font-size: 0.8rem;
            color: #444;
            /* Separation dot */
        }
        .special-item::after { content: "•"; color: #ccc; margin-left: 10px; }
        .special-item:last-child::after { content: ""; }

    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const CSV_URL = 'menu_nuovo.csv';
            
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: (res) => {
                    generateMenu(res.data);
                }
            });
        });

        function generateMenu(data) {
            const container = document.getElementById('content-container');
            const grouped = {};
            
            // Ordine delle Categorie
            const order = ["Caffetteria", "Tè & Cioccolate", "Bevande", "Spritz", "Cocktails", "Vini", "Franciacorta", "Birre", "Gin & Tonic", "Rum", "Whisky", "Amari e Liquori", "Grappe", "Brandy", "Vodka", "Vermouth", "Spuntini", "Panini & Piadine"];

            // Raggruppa i dati
            data.forEach(row => {
                const cat = row.Categoria ? row.Categoria.trim() : null;
                if(!cat) return;
                if(!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(row);
            });

            // Genera HTML
            order.forEach(cat => {
                if (!grouped[cat]) return;
                const items = grouped[cat];
                const section = document.createElement('div');
                section.className = 'section';

                // Titolo Categoria
                const h2 = document.createElement('h2');
                h2.className = 'category-title';
                h2.textContent = cat;
                section.appendChild(h2);

                // Intestazione Banco | Tavolo (Tranne se è box speciale)
                if (cat !== 'Cocktails') {
                    const hdr = document.createElement('div');
                    hdr.className = 'price-header';
                    hdr.innerHTML = '<span>BANCO | TAVOLO</span>';
                    section.appendChild(hdr);
                }

                // --- LOGICA SPECIALE: COCKTAILS (Box Unico) ---
                if (cat === 'Cocktails') {
                    const box = document.createElement('div');
                    box.className = 'special-box';
                    
                    // Header del box
                    box.innerHTML = `
                        <div class="special-header">
                            <span class="special-title">CLASSICI</span>
                            <span class="special-prices">€ 8.00 | € 8.00</span>
                        </div>
                        <div class="special-list"></div>
                    `;
                    
                    const listContainer = box.querySelector('.special-list');
                    items.forEach(item => {
                        const span = document.createElement('span');
                        span.className = 'special-item';
                        span.textContent = item.Nome;
                        listContainer.appendChild(span);
                    });
                    
                    section.appendChild(box);
                }
                
                // --- LOGICA STANDARD (Tutto il resto) ---
                else {
                    items.forEach(item => {
                        // Salta righe "info" pure (tipo titoli salumi senza prezzo)
                        if (!item.Prezzo) return;

                        const row = document.createElement('div');
                        row.className = 'menu-item';

                        // Prezzi: Gestisce il range di prezzi se c'è, o vuoto se manca Banco
                        // Nota: Il CSV ha Prezzo_banco (col D) e Prezzo (Tavolo, col E)
                        const pBanco = item.Prezzo_banco ? parseFloat(item.Prezzo_banco).toFixed(2) : '-';
                        const pTavolo = item.Prezzo ? parseFloat(item.Prezzo.replace(/[^\d.]/g, '')).toFixed(2) : '-';

                        row.innerHTML = `
                            <span class="item-name">${item.Nome}</span>
                            <span class="dots"></span>
                            <div class="item-prices">
                                <span class="price-banco">${pBanco}</span>
                                <span class="price-tavolo">${pTavolo}</span>
                            </div>
                        `;
                        section.appendChild(row);
                    });
                }

                container.appendChild(section);
            });
        }
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const CSV_URL = 'menu_nuovo_cassa.csv';
            
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: (res) => {
                    generateMenu(res.data);
                }
            });
        });

        function generateMenu(data) {
            const container = document.getElementById('content-container');
            const grouped = {};
            
            // Ordine delle Categorie
            const order = ["Caffetteria", "Tè & Cioccolate", "Bevande", "Spritz", "Cocktails", "Vini", "Franciacorta", "Birre", "Gin & Tonic", "Rum", "Whisky", "Amari e Liquori", "Grappe", "Brandy", "Vodka", "Vermouth", "Spuntini", "Panini & Piadine"];

            // Raggruppa i dati
            data.forEach(row => {
                const cat = row.Categoria ? row.Categoria.trim() : null;
                if(!cat) return;
                if(!grouped[cat]) grouped[cat] = [];
                grouped[cat].push(row);
            });

            // Genera HTML
            order.forEach(cat => {
                if (!grouped[cat]) return;
                const items = grouped[cat];
                const section = document.createElement('div');
                section.className = 'section';

                // Titolo Categoria
                const h2 = document.createElement('h2');
                h2.className = 'category-title';
                h2.textContent = cat;
                section.appendChild(h2);

                // Intestazione Banco | Tavolo (Tranne se è box speciale)
                if (cat !== 'Cocktails') {
                    const hdr = document.createElement('div');
                    hdr.className = 'price-header';
                    hdr.innerHTML = '<span>BANCO | TAVOLO</span>';
                    section.appendChild(hdr);
                }

                // --- LOGICA SPECIALE: COCKTAILS (Box Unico) ---
                if (cat === 'Cocktails') {
                    const box = document.createElement('div');
                    box.className = 'special-box';
                    
                    // Header del box
                    box.innerHTML = `
                        <div class="special-header">
                            <span class="special-title">CLASSICI</span>
                            <span class="special-prices">€ 8.00 | € 8.00</span>
                        </div>
                        <div class="special-list"></div>
                    `;
                    
                    const listContainer = box.querySelector('.special-list');
                    items.forEach(item => {
                        const span = document.createElement('span');
                        span.className = 'special-item';
                        span.textContent = item.Nome;
                        listContainer.appendChild(span);
                    });
                    
                    section.appendChild(box);
                }
                
                // --- LOGICA STANDARD (Tutto il resto) ---
                else {
                    items.forEach(item => {
                        // Salta righe "info" pure (tipo titoli salumi senza prezzo)
                        if (!item.Prezzo) return;

                        const row = document.createElement('div');
                        row.className = 'menu-item';

                        // Prezzi: Gestisce il range di prezzi se c'è, o vuoto se manca Banco
                        // Nota: Il CSV ha Prezzo_banco (col D) e Prezzo (Tavolo, col E)
                        const pBanco = item.Prezzo_banco ? parseFloat(item.Prezzo_banco).toFixed(2) : '-';
                        const pTavolo = item.Prezzo ? parseFloat(item.Prezzo.replace(/[^\d.]/g, '')).toFixed(2) : '-';

                        row.innerHTML = `
                            <span class="item-name">${item.Nome}</span>
                            <span class="dots"></span>
                            <div class="item-prices">
                                <span class="price-banco">${pBanco}</span>
                                <span class="price-tavolo">${pTavolo}</span>
                            </div>
                        `;
                        section.appendChild(row);
                    });
                }

                container.appendChild(section);
            });
        }
    </script>
