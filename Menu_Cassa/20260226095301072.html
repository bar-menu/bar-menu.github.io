<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Menu Cassa - A4 Perfetto</title>
    
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=Limelight&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- PAPAPARSE -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg-color: #fdfaf4; /*white; /* */
            --text-color: #111; /*#111;black;*/
            --accent-color: #b08d55; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #333; 
            font-family: 'Josefin Sans', sans-serif;
            color: var(--text-color);
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        #pages-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        .page {
            width: 210mm;
            height: 297mm;
            background-color: var(--bg-color);
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            overflow: hidden; 
            page-break-after: always;
        }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            body { background: none; }
            #pages-wrapper { padding: 0; gap: 0; display: block; }
            .page { box-shadow: none; margin: 0; }
        }

        /* --- CORNICE SVG --- */
        .full-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(145deg, 
                #a07f4a 0%,  
                #edd09d 50%,  
                #a88751 100%  
            );
            -webkit-mask: url('Cornici.svg') no-repeat center / 100% 100%;
            mask: url('Cornici.svg') no-repeat center / 100% 100%;
        }





        /* --- TITOLO MAIN --- */

        #main-title-box {
            text-align: center;
            margin-bottom: 10mm; /* Ho dato un filo di respiro in più sotto */
            color: #333; 
            break-inside: avoid;
            /* ECCO LA MAGIA: Scavalca le colonne e si centra su tutto il foglio */
            column-span: all; 
            -webkit-column-span: all;
        }
        .mt-menu { font-family: 'Limelight', cursive; font-size: 38pt; line-height: 1; }
        .mt-bar { font-family: 'Josefin Sans', sans-serif; font-weight: 300; font-size: 14pt; letter-spacing: 6px; text-transform: uppercase; margin-top: 5px; }

        /* --- AREE DEL TESTO --- */
        .content {
            position: absolute;
            top: 25mm; left: 20mm; right: 20mm; bottom: 25mm; 
            z-index: 10;
            column-count: 2; 
            column-gap: 12mm;
            column-rule: 1px solid #e0d0b0;
        }

        #content-1 { top: 28mm; } 

        .section { break-inside: avoid; margin-bottom: 7mm; }

        .split-col { break-inside: auto !important; }

        h2.category-title {
            font-family: 'Limelight', cursive;
            color: var(--accent-color);
            font-size: 1.3rem;
            margin-bottom: 2mm;
            text-transform: uppercase;
            border-bottom: 2px solid var(--accent-color);
            line-height: 1.2;
        }

        /* INTESTAZIONE BANCO | TAVOLO */
        .price-header {
            display: flex;
            justify-content: flex-end;
            gap: 10px; 
            width: 90px;
            margin-left: auto; 
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 4px;
        }
        .price-header span { width: 40px; text-align: right; }

        /* SINGOLO PRODOTTO */
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-end; 
            margin-bottom: 1.5mm;
            font-size: 0.9rem;
            line-height: 1.1; 
        }

        .item-name { 
            font-weight: 600; 
            padding-right: 4px;
            white-space: normal; 
            max-width: calc(100% - 95px); 
        }

        .sub-name {
            font-weight: 400 !important; 
            font-size: 0.85rem;
            color: #444;
            padding-left: 12px; 
        }

        .dots {
            flex-grow: 1;
            border-bottom: 1px dotted #999;
            margin: 0 4px;
            position: relative; top: -3px; 
        }

        /* AREA PREZZI NUMERICI */
        .item-prices {
            display: flex;
            width: 90px;
            flex-shrink: 0;
            justify-content: flex-end;
            gap: 10px; 
        }
        .price-val {
            width: 40px; 
            text-align: right;
            font-weight: 700; 
            color: #000; 
        }

        /* RIGA BOTTIGLIA */
        .bot-row { margin-top: -1mm; margin-bottom: 2.5mm; }
        .bot-name { font-weight: 400; font-style: italic; font-size: 0.8rem; color: #555; padding-left: 12px; }

        /* COCKTAIL */
        .cocktail-box { border: 2px solid var(--accent-color); padding: 8px; background-color: rgba(255,255,255,0.7); margin-bottom: 5mm; }
        .c-header { display: flex; justify-content: space-between; font-weight: 700; color: var(--accent-color); border-bottom: 1px solid var(--accent-color); margin-bottom: 8px; font-family: 'Limelight', cursive; font-size: 1.1rem; align-items: center; }
        .c-prices { font-family: 'Josefin Sans', sans-serif; font-weight: 700; color: #000; font-size: 0.8rem; }
        .c-grid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 10px; row-gap: 3px; }
        .c-name { font-size: 0.85rem; font-weight: 600; color: #222; text-transform: uppercase; }

/* --- PANINI --- */
        .panini-info { 
            font-size: 0.9rem; /* ALZATO: era 0.8rem, ora è grande come il resto del testo */
            font-style: italic; 
            color: #333; /* Scurito leggermente (era #444) per renderlo più leggibile */
            margin-bottom: 6px; /* Dato un pelino di respiro in più */
            line-height: 1.2; 
        }
        .panini-header { 
            font-weight: 700; 
            font-size: 0.95rem; /* Ho alzato di uno sputo anche il titolo per bilanciare */
            color: var(--accent-color); 
            margin-top: 8px; 
            margin-bottom: 2px; 
            text-transform: uppercase; 
        }
        /* --- QR CODE --- */
        .qr-section { text-align: center; margin-top: 15mm; break-inside: avoid; }
        .qr-section h4 { 
            font-family: 'Limelight', cursive; 
            font-size: 14pt; 
            color: var(--accent-color); 
            margin-bottom: 5px; 
            letter-spacing: 2px;
        }
        /* Immagine generata più grande (45x45mm) */
        .qr-section img { width: 42mm; height: 42mm; margin-top: 5px; }

    </style>
</head>
<body>

    <div id="pages-wrapper">
        <div class="page" id="page-1">
            <div class="full-frame"></div>
            <div class="content" id="content-1">
                <div id="main-title-box">
                    <div class="mt-menu">MENU</div>
                    <div class="mt-bar">Bar Nuovo</div>
                </div>
            </div>
        </div>

        <div class="page" id="page-2">
            <div class="full-frame"></div>
            <div class="content" id="content-2"></div>
        </div>

        <div class="page" id="page-3">
            <div class="full-frame"></div>
            <div class="content" id="content-3"></div>
        </div>

        <div class="page" id="page-4">
            <div class="full-frame"></div>
            <div class="content" id="content-4"></div>
        </div>
    </div>

    <script>
        const layoutPlan = {
            "content-1":[
                "Caffetteria", 
                "Tè & Cioccolate", 
                "Bevande",
                "Spuntini",
                "Panini & Piadine"
            ],
            "content-2":[
                "Spritz", 
                "Franciacorta", 
                "Vini", 
                "Birre",          
                "Amari e Liquori",
                "Cocktails"
            ],
            "content-3":[
                "Rum", 
                "Vodka",          
                "Grappe", 
                "Vermouth", 
                "Brandy"
            ],
            "content-4":[
                "Gin & Tonic", /* Invertito come richiesto */
                "Whisky"
            ]
        };

        document.addEventListener('DOMContentLoaded', () => {
            const CSV_URL = 'menu_nuovo_cassa.csv'; 
            
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: (res) => {
                    renderMenu(res.data);
                },
                error: (err) => {
                    console.error("ERRORE CSV:", err);
                    alert("Impossibile caricare il CSV.");
                }
            });
        });

        function renderMenu(data) {
            const grouped = {};
            
            data.forEach(row => {
                const cat = row.Categoria ? row.Categoria.trim() : null;
                if(!cat) return;
                if(!grouped[cat]) grouped[cat] =[];
                grouped[cat].push(row);
            });

            for (const[containerId, categories] of Object.entries(layoutPlan)) {
                const container = document.getElementById(containerId);
                
                categories.forEach(cat => {
                    if (!grouped[cat]) return;
                    const items = grouped[cat];

                    const section = document.createElement('div');
                    section.className = 'section';
                    
                    if (cat === 'Gin & Tonic') {
                        section.classList.add('split-col');
                    }

                    // --- COCKTAILS (Logica Classici vs Premium) ---
                    if (cat === 'Cocktails') {
                        // 1. Stampo il Titolo della Sezione
                        const h2 = document.createElement('h2');
                        h2.className = 'category-title';
                        h2.textContent = "COCKTAIL";
                        section.appendChild(h2);

                        // 2. Dividiamo i cocktail in base al prezzo
                        const classici = [];
                        const premium =[];

                        items.forEach(item => {
                            // Legge il prezzo e lo trasforma in numero per sicurezza
                            let rawPrice = item.Prezzo ? item.Prezzo.toString() : '';
                            let parsedPrice = parseFloat(rawPrice.replace(/[^\d.,]/g, '').replace(',', '.'));
                            
                            // Se il prezzo è esattamente 8 o vuoto (per errore), va nei classici, sennò nei premium
                            if (parsedPrice === 8 || isNaN(parsedPrice)) {
                                classici.push(item);
                            } else {
                                premium.push(item);
                            }
                        });

                        // 3. Creo il Box "Classici a 8€" (Solo se ci sono)
                        if (classici.length > 0) {
                            const box = document.createElement('div');
                            box.className = 'cocktail-box';
                            box.innerHTML = `
                                <div class="c-header">
                                    <span>CLASSICI:</span>
                                    <div class="c-prices">
                                        BANCO 8.00  &nbsp;|&nbsp;  TAVOLO 8.00
                                    </div>
                                </div>
                                <div class="c-grid"></div>
                            `;
                            const grid = box.querySelector('.c-grid');
                            classici.forEach(item => {
                                const div = document.createElement('div');
                                div.className = 'c-name';
                                div.textContent = item.Nome; 
                                grid.appendChild(div);
                            });
                            section.appendChild(box);
                        }

                        // 4. Stampo i Premium/Speciali sotto al box (con prezzi e puntini)
                        if (premium.length > 0) {
                            // Titolo Header Prezzi solo per questa sotto-sezione
                            const hdr = document.createElement('div');
                            hdr.className = 'price-header';
                            hdr.style.marginTop = '4px'; // Un pelo d'aria dal box
                            hdr.innerHTML = '<span>BANCO</span><span>TAVOLO</span>';
                            section.appendChild(hdr);

                            premium.forEach(item => {
                                const fmtPrice = (p) => {
                                    if(!p) return '-';
                                    let cl = p.toString().replace(/[^\d.,]/g, '').replace(',','.');
                                    let val = parseFloat(cl);
                                    return isNaN(val) ? '-' : val.toFixed(2);
                                };

                                let pB = fmtPrice(item.Prezzo_banco);
                                let pT = fmtPrice(item.Prezzo);

                                const row = document.createElement('div');
                                row.className = 'menu-item';
                                row.innerHTML = `
                                    <span class="item-name">${item.Nome}</span>
                                    <span class="dots"></span>
                                    <div class="item-prices">
                                        <span class="price-val">${pB}</span>
                                        <span class="price-val">${pT}</span>
                                    </div>
                                `;
                                section.appendChild(row);
                            });
                        }
                    }
                    
                    else {
                        const h2 = document.createElement('h2');
                        h2.className = 'category-title';
                        h2.textContent = cat;
                        section.appendChild(h2);

                        if (!cat.includes("Panini")) {
                            const hdr = document.createElement('div');
                            hdr.className = 'price-header';
                            hdr.innerHTML = '<span>BANCO</span><span>TAVOLO</span>';
                            section.appendChild(hdr);
                        }

                        items.forEach(item => {
                            if (cat.includes("Panini")) {
                                const isHeader = item.Nome.trim().endsWith(':') ||["Salumi:", "Formaggi:", "Verdure:", "SALSE:"].includes(item.Nome.trim());
                                if(isHeader) {
                                    section.innerHTML += `<div class="panini-header">${item.Nome.replace(':','')}</div>`;
                                }
                                if(item.Tipo === 'info' || (!item.Prezzo && item.Descrizione_Lista)) {
                                    section.innerHTML += `<div class="panini-info">${item.Descrizione_Lista || item.Descrizione_Popup}</div>`;
                                }
                            }

                            if(!item.Prezzo && !item.Prezzo_banco) return; 

                            let displayName = item.Nome.trim();
                            let nameClass = "item-name";
                            if(displayName.startsWith('-') || displayName.startsWith('+')) {
                                displayName = displayName.substring(1).trim();
                                nameClass = "item-name sub-name";
                            }

                            const rawPrice = item.Prezzo ? item.Prezzo.toString() : '';
                            const hasPipe = rawPrice.includes('|'); 

                            const fmtPrice = (p) => {
                                if(!p) return '-';
                                let cl = p.toString().replace(/[^\d.,]/g, '').replace(',','.');
                                let val = parseFloat(cl);
                                return isNaN(val) ? '-' : val.toFixed(2);
                            };

                            let pB = fmtPrice(item.Prezzo_banco);

                            if (hasPipe) {
                                let parts = rawPrice.split('|');
                                let pT_cal = fmtPrice(parts[0]); 
                                let pT_bot = fmtPrice(parts[1]); 

                                const rowCalice = document.createElement('div');
                                rowCalice.className = 'menu-item';
                                rowCalice.innerHTML = `
                                    <span class="${nameClass}">${displayName}</span>
                                    <span class="dots"></span>
                                    <div class="item-prices">
                                        <span class="price-val">${pB}</span>
                                        <span class="price-val">${pT_cal}</span>
                                    </div>
                                `;
                                section.appendChild(rowCalice);

                                const rowBottiglia = document.createElement('div');
                                rowBottiglia.className = 'menu-item bot-row';
                                rowBottiglia.innerHTML = `
                                    <span class="item-name bot-name">Bottiglia</span>
                                    <span class="dots"></span>
                                    <div class="item-prices">
                                        <span class="price-val">-</span>
                                        <span class="price-val">${pT_bot}</span>
                                    </div>
                                `;
                                section.appendChild(rowBottiglia);

                            } else {
                                let pT = fmtPrice(item.Prezzo);
                                
                                const row = document.createElement('div');
                                row.className = 'menu-item';
                                row.innerHTML = `
                                    <span class="${nameClass}">${displayName}</span>
                                    <span class="dots"></span>
                                    <div class="item-prices">
                                        <span class="price-val">${pB}</span>
                                        <span class="price-val">${pT}</span>
                                    </div>
                                `;
                                section.appendChild(row);
                            }
                        });
                    }
                    container.appendChild(section);
                });

                if (containerId === "content-3") {
                    const qrDiv = document.createElement('div');
                    qrDiv.className = 'qr-section';
                    qrDiv.innerHTML = `
                        <h4>MENU ONLINE</h4>
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://bar-menu.github.io/nuovo.html&color=333333" alt="QR Menu">
                    `;
                    container.appendChild(qrDiv);
                }
            }
        }
    </script>
</body>
</html>
